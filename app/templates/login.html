<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ops Control Room Auth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; height: 100vh; display: flex; align-items: center; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card p-4 shadow-lg">
                    <h3 class="text-center mb-3 text-info fw-bold">👁️ AGNES CONTROL</h3>
                    <p class="text-muted text-center small mb-4">Pipeline Image History Dashboard</p>
                    {% if error %}
                    <div class="alert alert-danger py-2 small text-center" role="alert">{{ error }}</div>
                    {% endif %}
                    <form method="POST" action="/login">
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Username</label>
                            <input type="text" name="username" class="form-control bg-dark text-white border-secondary" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-secondary small">Password</label>
                            <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required>
                        </div>
                        <button type="submit" class="btn btn-info w-100 fw-bold">Establish Session</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
